<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galactic Companion Explorer - MVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #b066ff;
            --dark-bg: #030308;
            --glass-bg: rgba(17, 25, 40, 0.75);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            overflow: hidden;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* UI Overlay */
        .ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        header {
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            pointer-events: auto;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
        }

        .sector-badge {
            background: rgba(176, 102, 255, 0.1);
            border: 1px solid rgba(176, 102, 255, 0.4);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .main-layout {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        .glass-panel {
            background-color: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            pointer-events: auto;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--primary);
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            padding-bottom: 10px;
        }

        /* Log Entry Styling inside Dashboard */
        .log-navigation-bar {
            grid-column: 1 / -1;
            /* Spans across both columns on desktop grid */
            display: flex;
            align-items: center;
            gap: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--glass-border);
            margin-top: 10px;
        }

        .day-selector {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            flex: 1;
            padding: 5px 0;
            scrollbar-width: none;
            position: relative;
        }

        .day-selector::-webkit-scrollbar {
            display: none;
        }

        .day-chip {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            color: #aaa;
        }

        .day-chip.active {
            background: var(--secondary);
            border-color: var(--secondary);
            color: white;
            box-shadow: 0 0 10px rgba(176, 102, 255, 0.4);
        }

        .nav-btn {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .nav-btn:hover {
            background: var(--primary);
            color: var(--dark-bg);
        }

        /* Dashboard */
        .dashboard {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 380px;
            max-height: calc(100vh - 100px);
            display: none;
            /* Controlled by .show class */
            flex-direction: column;
            padding: 0;
            overflow: hidden;
            z-index: 100;
            gap: 0;
        }

        .dashboard.show {
            display: flex;
        }

        .dashboard.minimized>*:not(.dashboard-header) {
            display: none;
        }

        .dashboard.minimized {
            max-height: 60px;
        }

        .dashboard-header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            z-index: 2;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .minimize-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .minimize-btn:hover {
            background: var(--primary);
            color: var(--dark-bg);
        }

        #dashboard-scroll-container {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex: 1;
            padding: 0 20px 20px 20px;
            gap: 15px;
        }

        .alien-image {
            width: calc(100% + 40px);
            margin: 0 -20px 15px -20px !important;
            height: auto;
            /*             aspect-ratio: 16 / 9;
            max-height: 250px;
            object-fit: cover;    */
            max-height: 280px;
            object-fit: contain;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 0 0 10px 10px;
            border-left: none;
            border-right: none;
            flex-shrink: 0;
            order: -1;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .alien-image:hover {
            opacity: 0.8;
        }

        /* Image Modal */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .image-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .image-modal img {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
            border: 2px solid var(--primary);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
            transform: scale(0.95);
            transition: transform 0.3s ease;
            touch-action: none; /* Crucial for native pinch prevention */
        }

        .image-modal.show img {
            transform: scale(1);
        }

        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.5);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            transition: background 0.2s;
        }

        .image-modal-close:hover {
            background: var(--primary);
            color: var(--dark-bg);
        }

        .data-point h3 {
            font-size: 0.85rem;
            color: var(--primary);
            text-transform: uppercase;
            margin: 0 0 8px 0;
        }

        .data-point p {
            margin: 0 0 15px 0;
            font-size: 1rem;
            line-height: 1.5;
            color: #e0e0e0;
        }

        #target-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 0;
            text-align: left;
        }

        .header-title-generic {
            color: var(--primary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            margin: 0;
        }

        /* Hide specific elements based on minimized state to prevent repeated text */
        .dashboard:not(.minimized) #target-name {
            display: none;
        }

        .dashboard.minimized .header-title-generic {
            display: none;
        }

        @media (max-width: 768px) {
            header {
                padding: 10px;
                gap: 5px;
            }

            h1 {
                font-size: 1.1rem;
            }

            .sector-badge {
                font-size: 0.7rem;
            }

            .dashboard {
                left: 0;
                right: 0;
                bottom: 0;
                width: 100%;
                border-radius: 20px 20px 0 0;
                border-bottom: none;
                border-left: none;
                border-right: none;
                background-color: rgba(5, 10, 15, 0.85) !important; /* Much darker for better contrast */
                backdrop-filter: blur(12px) !important; /* Stronger blur for legibility */
                -webkit-backdrop-filter: blur(12px) !important;
                max-height: 80vh;
                transform: translateY(0);
                transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            }

            .dashboard.minimized {
                max-height: 80vh; /* Don't crash size; translate instead */
                transform: translateY(calc(100% - 60px));
            }
            
            /* Prevent content from vanishing so sliding retains real height */
            .dashboard.minimized > *:not(.dashboard-header) {
                display: flex !important;
            }

            .dashboard-header {
                padding: 20px 15px 12px 15px;
                position: relative;
                touch-action: none; /* Prevent native scroll from hijacking the swipe drag */
            }

            .dashboard-header::before {
                content: '';
                position: absolute;
                top: 8px;
                left: 50%;
                transform: translateX(-50%);
                width: 40px;
                height: 4px;
                background: rgba(255, 255, 255, 0.4);
                border-radius: 4px;
            }

            .minimize-btn {
                display: none;
            }

            #dashboard-scroll-container {
                padding: 0 15px 15px 15px;
            }

            .data-point p {
                font-size: 1.15rem; /* Significantly larger for reading */
                line-height: 1.6;
                color: #ffffff; /* Brighter white for high contrast */
            }

            .data-point h3 {
                font-size: 1rem;
            }

            #target-name-content {
                font-size: 1.8rem !important; /* Larger planet title */
            }

            .alien-image {
                width: calc(100% + 30px);
                max-height: 35vh;
                margin: 0 -15px 15px -15px !important;
                object-fit: contain;
            }

            .log-navigation-bar {
                padding: 12px 15px;
            }
        }

        .planet-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            pointer-events: auto;
            cursor: pointer;
            white-space: nowrap;
            transform: translate(-50%, -100%);
            margin-top: -10px;
            opacity: 1;
            transition: opacity 0.3s;
            z-index: 5;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 243, 255, 0.3);
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>

    <div class="ui-layer">
        <header>
            <h1>Star Log Explorer</h1>
            <div class="sector-badge" id="sector-display">Sector: Local Solar System</div>
        </header>

        <div class="glass-panel dashboard" id="dashboard">
            <div class="dashboard-header">
                <div id="target-name">Select Destination</div>
                <div class="header-title-generic">Telemetry Link</div>
                <div class="minimize-btn" onclick="toggleDashboard()" id="dash-toggle">−</div>
            </div>

            <div id="dashboard-scroll-container">
                <img id="dashboard-img" class="alien-image" src="" alt="Daily View" onclick="openImageModal(this.src)">
                <div id="dashboard-content">
                    <h2 id="target-name-content" style="margin: 0 0 10px 0; font-size: 1.6rem; color: #fff;">Select
                        Destination</h2>
                    <div class="data-point" style="margin-top: 5px;">
                        <h3>Captain's Log</h3>
                        <p id="target-log" style="margin-top: 5px;">Establishing Uplink...</p>
                    </div>
                    <div class="data-point">
                        <h3>Science Database</h3>
                        <p id="target-fact" style="color: var(--primary); opacity: 0.9;"></p>
                    </div>
                </div>
            </div>

            <div class="log-navigation-bar">
                <button class="nav-btn" onclick="navigateLog(-1)">◀ Prev</button>
                <div class="day-selector" id="day-selector-list"></div>
                <button class="nav-btn" onclick="navigateLog(1)">Next ▶</button>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="image-modal" class="image-modal" onclick="if(event.target === this) closeImageModal()">
        <div class="image-modal-close" onclick="closeImageModal()">×</div>
        <img id="modal-img" src="" alt="Full Size View">
    </div>

    <script>
        function toggleDashboard() {
            const dash = document.getElementById('dashboard');
            const btn = document.getElementById('dash-toggle');
            const isMinimized = dash.classList.toggle('minimized');
            btn.textContent = isMinimized ? '+' : '−';
        }

        let imgScale = 1;
        let imgPointX = 0;
        let imgPointY = 0;
        let imgPanning = false;
        let imgStart = { x: 0, y: 0 };
        let initialPinchDist = null;
        let lastScale = 1;

        const modalImg = document.getElementById('modal-img');

        function updateModalTransform() {
            modalImg.style.transform = `translate(${imgPointX}px, ${imgPointY}px) scale(${imgScale})`;
        }

        modalImg.addEventListener('touchstart', (e) => {
            modalImg.style.transition = 'none'; // Disable smooth animation while actively dragging fingers
            if (e.touches.length === 2) {
                imgPanning = false;
                initialPinchDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                lastScale = imgScale;
            } else if (e.touches.length === 1) {
                imgPanning = true;
                imgStart = { x: e.touches[0].clientX - imgPointX, y: e.touches[0].clientY - imgPointY };
            }
        });

        modalImg.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Stop normal webpage scroll
            if (e.touches.length === 2 && initialPinchDist) {
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const zoom = dist / initialPinchDist;
                imgScale = Math.min(Math.max(1, lastScale * zoom), 5); // Limit zoom from 1x to 5x
                
                // Keep image centered if fully zoomed out
                if (imgScale <= 1) {
                    imgPointX = 0;
                    imgPointY = 0;
                }
                updateModalTransform();
            } else if (e.touches.length === 1 && imgPanning && imgScale > 1) {
                // Only allow finger panning if the photo is actually zoomed in
                imgPointX = e.touches[0].clientX - imgStart.x;
                imgPointY = e.touches[0].clientY - imgStart.y;
                updateModalTransform();
            }
        });

        modalImg.addEventListener('touchend', (e) => {
            modalImg.style.transition = 'transform 0.3s ease'; // Restore smooth animation when finger releases
            if (e.touches.length < 2) initialPinchDist = null;
            if (e.touches.length === 0) imgPanning = false;
            
            // Snap back beautifully if user shrinks it too small
            if (imgScale < 1) {
                imgScale = 1;
                imgPointX = 0;
                imgPointY = 0;
                updateModalTransform();
            }
        });

        function openImageModal(src) {
            if (!src) return;
            const modal = document.getElementById('image-modal');
            
            // Reset interactions
            imgScale = 1;
            imgPointX = 0;
            imgPointY = 0;
            modalImg.style.transform = `scale(1)`;
            
            modalImg.src = src;
            modal.classList.add('show');
        }

        function closeImageModal() {
            const modal = document.getElementById('image-modal');
            modal.classList.remove('show');
            setTimeout(() => {
                modalImg.src = "";
                modalImg.style.transform = `scale(0.95)`;
            }, 300); // Clear after fade-out animation
        }

        let journeyData = [];
        let solarSystemData = [];

        // --- SOLAR SYSTEM API MAPPING ---
        const textureBaseUrl = "https://raw.githubusercontent.com/harinii-a/3Dsolar-system-Threejs/main/imgs/";
        const visualMap = {
            "soleil": { color: 0xffcc00, angle: 0, tex: "suntexture.jpg" },
            "mercure": { color: 0xaaaaaa, angle: 1.2, tex: "mercury.jpg" },
            "venus": { color: 0xffaa00, angle: 3.4, tex: "venus.jpg" },
            "terre": { color: 0x00f3ff, angle: 0.5, tex: "earth.jpg" },
            "mars": { color: 0xff4400, angle: 4.1, tex: "mars.jpg" },
            "jupiter": { color: 0xd8ca9d, angle: 2.2, tex: "jupiter.jpg" },
            "saturne": { color: 0xf4d03f, angle: 5.8, tex: "saturn.jpg" },
            "uranus": { color: 0x4b70dd, angle: 1.9, tex: "uranus.jpg" },
            "neptune": { color: 0x4b70dd, angle: 3.1, tex: "neptune.jpg" }
        };
        const textureLoader = new THREE.TextureLoader();

        // MATH BUG FIX: Better planetary scaling to avoid overlapping distances and colliding sizes.
        function scaleDistance(km) { return (!km || km <= 0) ? 0 : Math.pow(km, 0.3) * 0.2; }
        function scaleSize(radiusKm, isSun) { return isSun ? 15 : Math.max(Math.pow((radiusKm || 1000) / 1000, 0.5) * 0.8, 0.6); }

        // --- 2. THREE.JS GLOBAL SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
        scene.add(camera);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 600;

        let currentMode = "none";
        let animatableObjects = [];
        let clickableObjects = [];
        let nodeMeshes = {};
        let planetLabels = []; // Labels to update in 2D
        let rocketShip;

        let targetFocus = new THREE.Vector3(0, 0, 0);
        let targetCameraPos = new THREE.Vector3(0, 30, 40);
        let isAutoNavigating = false;
        
        // Navigation tracking state
        let followedTargetMesh = null;
        let lastTargetPosition = new THREE.Vector3();
        let navDelayTimeout = null;
        let uiOpenTimeout = null;

        let flightPathLine;
        let visitedMeshes = [];
        const pathMaterial = new THREE.LineDashedMaterial({ color: 0x00f3ff, linewidth: 2, scale: 1, dashSize: 0.8, gapSize: 0.4, transparent: true, opacity: 0.6 });

        // --- 3. SCENE BUILDERS ---
        function clearScene() {
            const children = [...scene.children];
            children.forEach(child => {
                // Don't remove the camera or the rocket ship (which might be in transition)
                if (child.type !== "PerspectiveCamera" && child !== rocketShip) {
                    scene.remove(child);
                }
            });

            // Clear 2D labels
            planetLabels.forEach(l => l.element.remove());
            planetLabels = [];

            animatableObjects = animatableObjects.filter(anim => anim.type === "warp");
            clickableObjects = []; nodeMeshes = {}; visitedMeshes = [];
            addBackgroundStars();
        }

        function createRocketShip() {
            const wrapper = new THREE.Group();
            const group = new THREE.Group();
            wrapper.add(group);
            wrapper.userData.innerGroup = group;

            // Body (Cylinder)
            const bodyGeo = new THREE.CylinderGeometry(0.3, 0.3, 1, 16);
            const bodyMat = new THREE.MeshStandardMaterial({ 
                color: 0xdddddd, 
                metalness: 0.8, 
                roughness: 0.2,
                emissive: 0x111111 
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            group.add(body);

            // Nose (Cone)
            const noseGeo = new THREE.ConeGeometry(0.3, 0.5, 16);
            const noseMat = new THREE.MeshStandardMaterial({ color: 0xff0000 }); // Bright red nose
            const nose = new THREE.Mesh(noseGeo, noseMat);
            nose.position.y = 0.75;
            group.add(nose);

            // Fins - Small Swept Triangles
            const finShape = new THREE.Shape();
            finShape.moveTo(0, 0.1);      // top inner (attached to body)
            finShape.lineTo(0.25, -0.4);  // bottom outer tip
            finShape.lineTo(0, -0.3);     // bottom inner (attached to body)
            finShape.lineTo(0, 0.1);      // close shape
            
            const extrudeSettings = { depth: 0.04, bevelEnabled: false };
            const finGeo = new THREE.ExtrudeGeometry(finShape, extrudeSettings);
            finGeo.translate(0, 0, -0.02); // Center depth
            
            const finMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            for (let i = 0; i < 3; i++) {
                const finGroup = new THREE.Group();
                const fin = new THREE.Mesh(finGeo, finMat);
                fin.position.x = 0.28; // Push outward so inner edge touches cylinder radius 0.3
                finGroup.add(fin);
                
                const angle = (i / 3) * Math.PI * 2;
                finGroup.rotation.y = angle;
                group.add(finGroup);
            }
            
            // Engine Base
            const engineGeo = new THREE.CylinderGeometry(0.15, 0.2, 0.2, 16);
            const engineMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
            const engine = new THREE.Mesh(engineGeo, engineMat);
            engine.position.y = -0.6;
            group.add(engine);

            // Flame
            const flameGeo = new THREE.ConeGeometry(0.15, 0.6, 16);
            const flameMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.9 });
            const flame = new THREE.Mesh(flameGeo, flameMat);
            flame.position.y = -0.9;
            flame.rotation.x = Math.PI; // Point downwards
            group.add(flame);
            group.userData.flame = flame; // save reference for animation

            // Add a small light to the rocket
            const rocketLight = new THREE.PointLight(0xffaa00, 1.5, 5);
            rocketLight.position.y = -0.6;
            group.add(rocketLight);

            return wrapper;
        }

        function addBackgroundStars() {
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(4000 * 3);
            for (let i = 0; i < 12000; i++) { starPos[i] = (Math.random() - 0.5) * 800; }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.5 }));
            scene.add(stars);
            animatableObjects.push({ obj: stars, type: "rotation", speed: 0.0002 });
        }

        function buildSolarSystem() {
            clearScene();
            currentMode = "solar";
            document.getElementById('sector-display').innerText = "Sector: Local Solar System";

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const sunLight = new THREE.PointLight(0xffffff, 2.5, 800);
            scene.add(sunLight);

            solarSystemData.forEach(body => {
                const visual = visualMap[body.id];
                if (!visual) return;

                const isSun = body.id === 'soleil';
                // Bypass distance calculation entirely if it is the sun
                const uiDistance = isSun ? 0 : scaleDistance(body.semimajorAxis);
                const uiSize = scaleSize(body.meanRadius, isSun);

                const visitRecord = journeyData.find(j => j.TargetID === body.id);
                const isVisited = !!visitRecord;

                if (!isSun) {
                    const ringGeo = new THREE.RingGeometry(uiDistance - 0.1, uiDistance + 0.1, 64);
                    const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.05 });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.rotation.x = Math.PI / 2;
                    scene.add(ring);
                }

                const geo = new THREE.SphereGeometry(uiSize, 32, 32);

                let mat;
                if (isSun) {
                    mat = new THREE.MeshBasicMaterial({
                        map: textureLoader.load(textureBaseUrl + visual.tex),
                        transparent: true, opacity: 1.0, color: 0xffffff
                    });
                } else {
                    mat = new THREE.MeshStandardMaterial({
                        map: textureLoader.load(textureBaseUrl + visual.tex),
                        transparent: true, opacity: isVisited ? 1.0 : 0.2,
                        roughness: 0.6, color: 0xffffff
                    });
                }
                const mesh = new THREE.Mesh(geo, mat);

                const pos = new THREE.Vector3(Math.cos(visual.angle) * uiDistance, 0, Math.sin(visual.angle) * uiDistance);
                mesh.position.copy(pos);

                mesh.userData = visitRecord || {
                    TargetID: body.id, DisplayName: body.englishName,
                    LogEntry: "Location locked.", Fact: "Awaiting exploration telemetry."
                };

                // Render Earth's Moon (Hardcoded default)
                if (body.id === 'terre') {
                    const moon = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.8 }));
                    moon.position.set(2.5, 0, 0);
                    mesh.add(moon);
                    animatableObjects.push({ obj: moon, type: "orbit", speed: 0.005, orbitRadius: 2.5, angle: 0 });
                }

                // Render Dynamic Objects/Moons (like Jupiter's moons or the ISS) if they exist in the log data
                // In the Google Sheet, the user could add 'iss' or 'europa' as TargetIDs.
                // We're simulating this capability below to show how it's handled.
                if (body.id === 'jupiter') {
                    const moons = [
                        { id: 'io', name: 'Io', color: 0xffffaa, radius: 0.3, distance: 3.5, speed: 0.012 },
                        { id: 'europa', name: 'Europa', color: 0xffffff, radius: 0.25, distance: 4.8, speed: 0.009 },
                        { id: 'ganymede', name: 'Ganymede', color: 0xcccccc, radius: 0.4, distance: 6.5, speed: 0.005 }
                    ];

                    moons.forEach(m => {
                        // Check if the user visited this specific moon in their journey log
                        const moonVisit = journeyData.find(j => j.TargetID === m.id);

                        // Only build the moon if it was visited, saving rendering power
                        if (moonVisit) {
                            const mMesh = new THREE.Mesh(new THREE.SphereGeometry(m.radius, 16, 16), new THREE.MeshStandardMaterial({ color: m.color, roughness: 0.8 }));
                            mMesh.position.set(m.distance, 0, 0);
                            mesh.add(mMesh);

                            mMesh.userData = moonVisit;
                            nodeMeshes[m.id] = mMesh;
                            clickableObjects.push(mMesh);

                            // It gets its own label too!
                            const mLabelDiv = document.createElement('div');
                            mLabelDiv.className = 'planet-label';
                            mLabelDiv.textContent = moonVisit.DisplayName || m.name;
                            const handleMoonTap = (e) => { e.preventDefault(); handleDestinationClick(mMesh.userData); };
                            mLabelDiv.addEventListener('click', handleMoonTap);
                            mLabelDiv.addEventListener('touchstart', handleMoonTap, { passive: false });
                            document.body.appendChild(mLabelDiv);
                            planetLabels.push({ element: mLabelDiv, mesh: mMesh });

                            animatableObjects.push({ obj: mMesh, type: "orbit", speed: m.speed, orbitRadius: m.distance, angle: Math.random() * Math.PI * 2 });
                        }
                    });
                }

                scene.add(mesh);
                nodeMeshes[body.id] = mesh;

                // Add an invisible, larger hitbox for the Sun to make it easier to tap
                if (isSun) {
                    const hitboxGeo = new THREE.SphereGeometry(uiSize * 1.05, 16, 16); // Only slightly larger than the visual sphere
                    const hitboxMat = new THREE.MeshBasicMaterial({ visible: false });
                    const hitbox = new THREE.Mesh(hitboxGeo, hitboxMat);
                    hitbox.userData = mesh.userData;
                    mesh.add(hitbox);
                    clickableObjects.push(hitbox);
                } else if (isVisited) {
                    clickableObjects.push(mesh);
                }

                // Add Labels for kids (only if visited or is the sun)
                if (isVisited || isSun) {
                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'planet-label';
                    labelDiv.textContent = body.englishName;

                    const handleLabelTap = (e) => {
                        e.preventDefault();
                        handleDestinationClick(mesh.userData);
                    };
                    labelDiv.addEventListener('click', handleLabelTap);
                    labelDiv.addEventListener('touchstart', handleLabelTap, { passive: false });

                    document.body.appendChild(labelDiv);
                    planetLabels.push({ element: labelDiv, mesh: mesh });
                }

                if (isVisited || isSun) {
                    animatableObjects.push({ obj: mesh, type: "orbit", speed: 0.0002, orbitRadius: uiDistance, angle: visual.angle });
                }
            });

            buildAsteroidBelt();
            buildFlightPath("solar");
        }

        function buildAsteroidBelt() {
            const asteroidCount = 800;
            const instancedMesh = new THREE.InstancedMesh(new THREE.IcosahedronGeometry(0.3, 0), new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 }), asteroidCount);
            const dummy = new THREE.Object3D();

            for (let i = 0; i < asteroidCount; i++) {
                // The Asteroid Belt should be mathematically positioned between Mars (~66) and Jupiter (~95.6)
                const radius = 72 + Math.random() * 12;
                const angle = Math.random() * Math.PI * 2;
                dummy.position.set(Math.cos(angle) * radius, (Math.random() - 0.5) * 3, Math.sin(angle) * radius);
                dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
                dummy.scale.setScalar(0.5 + Math.random());
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
            }
            scene.add(instancedMesh);
            animatableObjects.push({ obj: instancedMesh, type: "rotation", speed: 0.0002 });
        }

        function buildDeepSpace() {
            clearScene();
            currentMode = "deepspace";
            document.getElementById('sector-display').innerText = "Sector: Deep Space";

            const solarAnchorGeo = new THREE.SphereGeometry(2, 16, 16);
            const solarAnchorMat = new THREE.MeshBasicMaterial({ color: 0x00f3ff });
            const solarAnchor = new THREE.Mesh(solarAnchorGeo, solarAnchorMat);

            solarAnchor.position.set(0, 0, 0);
            solarAnchor.userData = {
                TargetID: "solar_origin", SceneType: "solar", DisplayName: "Local Solar System",
                LogEntry: "Looking back, our whole solar system is just a tiny speck of light!",
                Fact: "The Solar System is located in the Orion Arm of the Milky Way galaxy."
            };

            scene.add(solarAnchor);
            nodeMeshes["solar_origin"] = solarAnchor;

            // Add invisible hitbox to make it easier to click
            const anchorHitboxGeo = new THREE.SphereGeometry(3, 16, 16); // 1.5x larger than the visual sphere (previously 3x)
            const anchorHitboxMat = new THREE.MeshBasicMaterial({ visible: false });
            const anchorHitbox = new THREE.Mesh(anchorHitboxGeo, anchorHitboxMat);
            anchorHitbox.userData = solarAnchor.userData;
            solarAnchor.add(anchorHitbox);

            clickableObjects.push(anchorHitbox);
            animatableObjects.push({ obj: solarAnchor, type: "rotation", speed: 0.005 });

            // Add Label for Solar System Return Node
            const solarLabelDiv = document.createElement('div');
            solarLabelDiv.className = 'planet-label';
            solarLabelDiv.textContent = "Local Solar System";

            const handleSolarTap = (e) => {
                e.preventDefault();
                handleDestinationClick(solarAnchor.userData);
            };
            solarLabelDiv.addEventListener('click', handleSolarTap);
            solarLabelDiv.addEventListener('touchstart', handleSolarTap, { passive: false });

            document.body.appendChild(solarLabelDiv);
            planetLabels.push({ element: solarLabelDiv, mesh: solarAnchor });


            const deepSpaceNodes = journeyData.filter(d => d.SceneType === "deepspace");

            deepSpaceNodes.forEach(node => {
                const ra = Number(node.RA) || 0;
                const dec = Number(node.Dec) || 0;
                const distLY = Number(node.Distance_LY) || 10;

                const raRad = (ra * 15) * (Math.PI / 180);
                const decRad = dec * (Math.PI / 180);
                const r = Math.log10(distLY + 1) * 20 + 20;

                const pos = new THREE.Vector3(
                    r * Math.cos(decRad) * Math.cos(raRad),
                    r * Math.sin(decRad),
                    r * Math.cos(decRad) * Math.sin(raRad)
                );

                const nebula = new THREE.Mesh(new THREE.SphereGeometry(3, 16, 16), new THREE.MeshBasicMaterial({ color: 0xb066ff, wireframe: true }));
                nebula.position.copy(pos);
                nebula.userData = node;

                scene.add(nebula);
                const nodeId = node.TargetID || node.DisplayName;
                nodeMeshes[nodeId] = nebula;

                // Add Labels for Deep Space
                const labelDiv = document.createElement('div');
                labelDiv.className = 'planet-label';
                labelDiv.textContent = node.DisplayName;

                const handleDeepTap = (e) => {
                    e.preventDefault();
                    handleDestinationClick(nebula.userData);
                };
                labelDiv.addEventListener('click', handleDeepTap);
                labelDiv.addEventListener('touchstart', handleDeepTap, { passive: false });

                document.body.appendChild(labelDiv);
                planetLabels.push({ element: labelDiv, mesh: nebula });

                clickableObjects.push(nebula);
                animatableObjects.push({ obj: nebula, type: "rotation", speed: 0.005 });
            });

            buildFlightPath("deepspace");
        }

        function buildFlightPath(sceneType) {
            if (sceneType === "solar") {
                const validJourney = journeyData.filter(d => d.SceneType === "solar");
                visitedMeshes = validJourney.map(entry => nodeMeshes[entry.TargetID || entry.DisplayName]).filter(mesh => mesh !== undefined);
            } else if (sceneType === "deepspace") {
                const validJourney = journeyData.filter(d => d.SceneType === "deepspace");
                visitedMeshes = validJourney.map(entry => nodeMeshes[entry.TargetID || entry.DisplayName]).filter(mesh => mesh !== undefined);
                if (nodeMeshes["solar_origin"]) visitedMeshes.unshift(nodeMeshes["solar_origin"]);
            }

            if (visitedMeshes.length > 1) {
                const pathPoints = visitedMeshes.map(mesh => mesh.position);
                flightPathLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pathPoints), pathMaterial);
                flightPathLine.computeLineDistances();
                scene.add(flightPathLine);
            } else {
                flightPathLine = null;
            }
        }

        // --- 4. NAVIGATION & STATE MACHINE ---
        function handleDestinationClick(data) {
            if (!data) return;
            const targetId = data.TargetID || data.DisplayName;
            if (!targetId) return;

            if (data.SceneType !== currentMode) {
                triggerHyperjump(data.SceneType, data);
            } else {
                const targetMesh = nodeMeshes[targetId];
                if (targetMesh) flyToTarget(targetMesh, data);
            }
        }

        function triggerHyperjump(targetSceneType, targetData) {
            isAutoNavigating = false;

            const lineGeo = new THREE.BufferGeometry();
            const numLines = 1000;
            const points = new Float32Array(numLines * 6);
            for (let i = 0; i < numLines; i++) {
                const r = 3 + Math.random() * 80;
                const theta = Math.random() * Math.PI * 2;
                const x = r * Math.cos(theta);
                const y = r * Math.sin(theta);
                const z = - (Math.random() * 150);
                points[i * 6] = x; points[i * 6 + 1] = y; points[i * 6 + 2] = z;
                points[i * 6 + 3] = x; points[i * 6 + 4] = y; points[i * 6 + 5] = z;
            }
            lineGeo.setAttribute('position', new THREE.BufferAttribute(points, 3));
            lineGeo.setAttribute('basePosition', new THREE.BufferAttribute(new Float32Array(points), 3));

            const lineMat = new THREE.LineBasicMaterial({ color: 0x00f3ff, transparent: true, opacity: 0.8 });
            const warpLines = new THREE.LineSegments(lineGeo, lineMat);
            camera.add(warpLines);

            const warpDuration = 1800;
            animatableObjects.push({ obj: warpLines, type: 'warp', startTime: Date.now(), duration: warpDuration });

            setTimeout(() => {
                if (targetSceneType === "solar") buildSolarSystem();
                if (targetSceneType === "deepspace") buildDeepSpace();

                let targetMeshId = targetData.TargetID || targetData.DisplayName;
                if (targetMeshId === "solar_origin") targetMeshId = "terre";

                const targetMesh = nodeMeshes[targetMeshId];
                if (targetMesh) flyToTarget(targetMesh, targetData, true);
            }, warpDuration / 2);
        }

        function flyToTarget(mesh, data, instant = false) {
            followedTargetMesh = mesh;
            lastTargetPosition.copy(mesh.position);
            
            const pos = mesh.position;
            targetFocus.copy(pos);

            // Adjust camera base distance dynamically based on target radius
            let baseDistance = 20;
            if (mesh.geometry && mesh.geometry.parameters && mesh.geometry.parameters.radius) {
                const r = mesh.geometry.parameters.radius;
                // If it's a massive object like the Sun, back the camera way off.
                baseDistance = Math.max(20, r * 3.5);
            }

            targetCameraPos.set(pos.x + baseDistance * 0.75, pos.y + baseDistance * 0.5, pos.z + baseDistance);

            const dashboard = document.getElementById('dashboard');
            dashboard.classList.add('show');
            
            const dashToggle = document.getElementById('dash-toggle');

            if (navDelayTimeout) clearTimeout(navDelayTimeout);
            if (uiOpenTimeout) clearTimeout(uiOpenTimeout);

            // Cinematic Reveal: stay minimized until we arrive
            if (!instant) {
                dashboard.classList.add('minimized');
                if (dashToggle) dashToggle.textContent = '+';
                
                isAutoNavigating = false;
                navDelayTimeout = setTimeout(() => {
                    isAutoNavigating = true;
                }, 400); // Wait 400ms for UI to minimize before moving the camera
            } else {
                dashboard.classList.remove('minimized');
                if (dashToggle) dashToggle.textContent = '−';
                isAutoNavigating = true;
            }

            document.getElementById('target-name').innerText = data.DisplayName || "Unknown Sector";
            document.getElementById('target-name-content').innerText = data.DisplayName || "Unknown Sector";
            document.getElementById('target-log').innerText = data.LogEntry || "No data.";
            document.getElementById('target-fact').innerText = data.Fact || "";

            const imgElement = document.getElementById('dashboard-img');
            if (data.ImageURL) {
                // Parse Google Drive generic/export URLs into robust image viewer URLs
                const idMatch = data.ImageURL.match(/id=([^&]+)/) || data.ImageURL.match(/\/d\/([^/]+)/);
                if (idMatch && idMatch[1]) {
                    imgElement.src = `https://lh3.googleusercontent.com/d/${idMatch[1]}=w1000`;
                } else {
                    imgElement.src = data.ImageURL;
                }
                imgElement.style.display = 'block';
            } else {
                imgElement.src = "";
                imgElement.style.display = 'none';
            }

            // (isAutoNavigating is handled dynamically by timers above instead)

            // --- ROCKET SHIP LOGIC ---
            if (!rocketShip) {
                rocketShip = createRocketShip();
            }
            
            // Ensure animation persists after scene clearing
            if (!animatableObjects.find(a => a.obj === rocketShip)) {
                animatableObjects.push({ obj: rocketShip, type: "rotation", speed: 0.02 });
            }

            // Remove from old parent if any
            if (rocketShip.parent) {
                rocketShip.parent.remove(rocketShip);
            }

            // Add to new target mesh
            mesh.add(rocketShip);

            // Position it near the surface, on the flight path connecting to the previous planet
            const radius = (mesh.geometry && mesh.geometry.parameters) ? mesh.geometry.parameters.radius : 1;
            const offsetDist = radius * 1.5;

            const offsetDir = new THREE.Vector3(1, 0, 0); // Default pointing right
            
            if (visitedMeshes && visitedMeshes.length > 0) {
                const idx = visitedMeshes.indexOf(mesh);
                let targetPrevPos = null;
                if (idx > 0) {
                    targetPrevPos = visitedMeshes[idx - 1].position;
                } else if (visitedMeshes.length > 1 && idx === -1) {
                    // Clicked unvisited target, point relative to the last visited path
                    targetPrevPos = visitedMeshes[visitedMeshes.length - 1].position;
                }
                
                if (targetPrevPos && targetPrevPos.distanceTo(mesh.position) > 0.01) {
                    // Get global direction FROM the mesh BACK along the incoming flight path
                    const globalDir = new THREE.Vector3().subVectors(targetPrevPos, mesh.position).normalize();
                    // Convert to local space of the mesh (since meshes can rotate/orbit)
                    const worldPoint = new THREE.Vector3().copy(mesh.position).add(globalDir);
                    mesh.updateMatrixWorld();
                    offsetDir.copy(mesh.worldToLocal(worldPoint)).normalize();
                }
            }

            // Put the rocket exactly on that incoming path line
            rocketShip.position.copy(offsetDir).multiplyScalar(offsetDist);
            
            // Orient the rocket's nose (+Y) backward along that same line (facing where it came from)
            rocketShip.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), offsetDir);
            
            // Scale rocket based on planet size
            const targetScale = Math.max(0.1, radius * 0.15);
            rocketShip.scale.setScalar(targetScale);

            if (instant) {
                camera.position.copy(targetCameraPos);
                controls.target.copy(targetFocus);
                document.getElementById('dashboard').classList.remove('minimized');
                if (document.getElementById('dash-toggle')) document.getElementById('dash-toggle').textContent = '−';
            }
        }

        // --- 5. INITIALIZE UI ---
        function initializeTravelLog() {
            const selectorList = document.getElementById('day-selector-list');
            selectorList.innerHTML = '';

            journeyData.forEach((entry, index) => {
                const chip = document.createElement('div');
                chip.className = 'day-chip';
                chip.id = `day-chip-${index}`;
                // Now including the visit destination in the chip
                chip.textContent = `${index + 1}: ${entry.DisplayName}`;
                chip.addEventListener('click', () => selectLogEntry(index));
                selectorList.appendChild(chip);
            });
        }

        let currentLogIndex = -1;
        function selectLogEntry(index) {
            if (index < 0 || index >= journeyData.length) return;
            currentLogIndex = index;

            document.querySelectorAll('.day-chip').forEach(el => el.classList.remove('active'));
            const activeChip = document.getElementById(`day-chip-${index}`);
            if (activeChip) {
                activeChip.classList.add('active');

                // Manually calculate the scroll position to keep the chip centered.
                const selectorContainer = document.getElementById('day-selector-list');

                // Because the container is position: relative, activeChip.offsetLeft is already 
                // the exact distance from the start of the scrollable content. 
                const scrollTarget = activeChip.offsetLeft - (selectorContainer.clientWidth / 2) + (activeChip.clientWidth / 2);

                selectorContainer.scrollTo({ left: scrollTarget, behavior: 'smooth' });
            }
            handleDestinationClick(journeyData[index]);
        }

        function navigateLog(dir) {
            let next = currentLogIndex + dir;
            if (next < 0) next = journeyData.length - 1;
            if (next >= journeyData.length) next = 0;
            selectLogEntry(next);
        }

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function handleSceneInteract(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(clickableObjects);
            if (intersects.length > 0) {
                let targetData = intersects[0].object.userData;
                if (!targetData.TargetID && intersects[0].object.parent && intersects[0].object.parent.userData.TargetID) {
                    targetData = intersects[0].object.parent.userData;
                }
                if (targetData.TargetID) handleDestinationClick(targetData);
            }
        }

        let pointerDownPos = { x: 0, y: 0 };
        let pointerMoved = false;

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName !== 'CANVAS') return;
            pointerDownPos.x = event.clientX;
            pointerDownPos.y = event.clientY;
            pointerMoved = false;
        });

        window.addEventListener('pointermove', (event) => {
            // Track if the pointer actually dragged/pinched across the screen vs just tapping
            if (Math.hypot(event.clientX - pointerDownPos.x, event.clientY - pointerDownPos.y) > 10) {
                pointerMoved = true;
            }
        });

        window.addEventListener('pointerup', (event) => {
            if (event.target.tagName !== 'CANVAS' || pointerMoved) return;
            handleSceneInteract(event.clientX, event.clientY);
        });

        controls.addEventListener('start', () => isAutoNavigating = false);

        // --- 6. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            animatableObjects.forEach(anim => {
                if (anim.type === "rotation") {
                    if (anim.obj.userData && anim.obj.userData.innerGroup) {
                        anim.obj.userData.innerGroup.rotation.y += anim.speed;
                        // pulse the flame
                        if (anim.obj.userData.innerGroup.userData.flame) {
                            const scale = 1 + Math.sin(Date.now() * 0.02) * 0.2;
                            anim.obj.userData.innerGroup.userData.flame.scale.set(1, scale, 1);
                        }
                    } else {
                        anim.obj.rotation.y += anim.speed;
                    }
                } else if (anim.type === "orbit") {
                    anim.angle += anim.speed;
                    anim.obj.position.x = Math.cos(anim.angle) * anim.orbitRadius;
                    anim.obj.position.z = Math.sin(anim.angle) * anim.orbitRadius;
                } else if (anim.type === "warp") {
                    const elapsed = Date.now() - anim.startTime;
                    const progress = elapsed / anim.duration;

                    if (progress > 1) {
                        camera.remove(anim.obj);
                        anim.obj.geometry.dispose();
                        anim.obj.material.dispose();
                        anim.markForDeletion = true;
                        camera.fov = 45;
                        camera.updateProjectionMatrix();
                        return;
                    }

                    const positions = anim.obj.geometry.attributes.position.array;
                    const basePos = anim.obj.geometry.attributes.basePosition.array;

                    let speedCurve = Math.sin(progress * Math.PI);
                    let travelDist = elapsed * 0.4;

                    for (let i = 0; i < positions.length / 6; i++) {
                        let z = basePos[i * 6 + 2] + travelDist;
                        z = ((z + 150) % 180) - 150;

                        positions[i * 6 + 2] = z;
                        positions[i * 6 + 5] = z + (speedCurve * 80);
                    }
                    anim.obj.geometry.attributes.position.needsUpdate = true;

                    camera.fov = 45 + (speedCurve * 50);
                    camera.updateProjectionMatrix();
                }
            });

            animatableObjects = animatableObjects.filter(a => !a.markForDeletion);

            if (flightPathLine && visitedMeshes.length > 1 && currentMode === "solar") {
                const updatedPoints = visitedMeshes.map(mesh => mesh.position);
                flightPathLine.geometry.setFromPoints(updatedPoints);
                flightPathLine.computeLineDistances();
            }

            if (followedTargetMesh) {
                targetFocus.copy(followedTargetMesh.position);
                const delta = new THREE.Vector3().subVectors(followedTargetMesh.position, lastTargetPosition);
                
                targetCameraPos.add(delta); // Keep target updated securely while waiting to fly

                if (!isAutoNavigating) {
                    controls.target.add(delta);
                    camera.position.add(delta);
                } else {
                    controls.target.lerp(targetFocus, 0.04);
                    camera.position.lerp(targetCameraPos, 0.04);
                    if (camera.position.distanceTo(targetCameraPos) < 1.0) {
                        isAutoNavigating = false;
                        if (uiOpenTimeout) clearTimeout(uiOpenTimeout);
                        uiOpenTimeout = setTimeout(() => {
                            document.getElementById('dashboard').classList.remove('minimized');
                            if (document.getElementById('dash-toggle')) document.getElementById('dash-toggle').textContent = '−';
                        }, 500); // Extra 500ms delay to enjoy the planet view
                    }
                }
                lastTargetPosition.copy(followedTargetMesh.position);
            } else if (isAutoNavigating) {
                controls.target.lerp(targetFocus, 0.04);
                camera.position.lerp(targetCameraPos, 0.04);
                if (camera.position.distanceTo(targetCameraPos) < 1.0) {
                    isAutoNavigating = false;
                    if (uiOpenTimeout) clearTimeout(uiOpenTimeout);
                    uiOpenTimeout = setTimeout(() => {
                        document.getElementById('dashboard').classList.remove('minimized');
                        if (document.getElementById('dash-toggle')) document.getElementById('dash-toggle').textContent = '−';
                    }, 500); // Extra 500ms delay to enjoy the planet view
                }
            }

            // Important: Update controls and matrix BEFORE calculating 2D label projections
            // to stop labels from "falling off" or lagging behind the swipe
            controls.update();
            camera.updateMatrixWorld();

            // Update 2D Labels
            const vector = new THREE.Vector3();
            planetLabels.forEach(label => {
                vector.setFromMatrixPosition(label.mesh.matrixWorld);
                vector.project(camera);

                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (vector.y * -0.5 + 0.5) * window.innerHeight;

                label.element.style.left = `${x}px`;
                label.element.style.top = `${y}px`;

                // Hide if behind camera
                if (vector.z > 1) {
                    label.element.style.opacity = 0;
                } else {
                    label.element.style.opacity = 1;
                }
            });

            renderer.render(scene, camera);
        }

        // --- 7. APP BOOTSTRAPPER ---
        async function startGalacticExplorer() {
            const API_URL = "https://script.google.com/macros/s/AKfycbyvdQAxbEycR2eh7H1M3grdkpYe4d_GsUOfwALKi1UKW9vMpI6G-46xt1vMWscem1U2/exec";

            document.getElementById('dashboard').classList.add('show');
            document.getElementById('target-name').innerText = "Establishing Uplink...";
            document.getElementById('target-log').innerText = "Downloading telemetry. Please stand by.";

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Google Sheet network response was not ok.");
                journeyData = await response.json();
            } catch (error) {
                document.getElementById('target-name').innerText = "Connection Failed";
                document.getElementById('target-log').innerText = "Failed to fetch from Google Apps Script.";
                return;
            }

            try {
                const apiRes = await fetch('https://api.le-systeme-solaire.net/rest/bodies');
                if (!apiRes.ok) throw new Error("French API network response was not ok.");
                const apiJson = await apiRes.json();
                solarSystemData = apiJson.bodies;
            } catch (error) {
                console.warn("Using fallback planetary data: " + error.message);
                solarSystemData = [
                    { id: "soleil", englishName: "Sun", semimajorAxis: 0, meanRadius: 696340 },
                    { id: "mercure", englishName: "Mercury", semimajorAxis: 57909050, meanRadius: 2439.7 },
                    { id: "venus", englishName: "Venus", semimajorAxis: 108208000, meanRadius: 6051.8 },
                    { id: "terre", englishName: "Earth", semimajorAxis: 149598023, meanRadius: 6371 },
                    { id: "mars", englishName: "Mars", semimajorAxis: 227939200, meanRadius: 3389.5 },
                    { id: "jupiter", englishName: "Jupiter", semimajorAxis: 778570000, meanRadius: 69911 },
                    { id: "saturne", englishName: "Saturn", semimajorAxis: 1433530000, meanRadius: 58232 },
                    { id: "uranus", englishName: "Uranus", semimajorAxis: 2872400000, meanRadius: 25362 },
                    { id: "neptune", englishName: "Neptune", semimajorAxis: 4495100000, meanRadius: 24622 }
                ];
            }

            if (!journeyData || journeyData.length === 0) {
                document.getElementById('target-log').innerText = "No flight logs found for today's date.";
                return;
            }

            try {
                initializeTravelLog();
                buildSolarSystem();

                const latestEntryIndex = journeyData.length - 1;
                selectLogEntry(latestEntryIndex);

                animate();
            } catch (error) {
                document.getElementById('target-name').innerText = "System Error";
                document.getElementById('target-log').innerHTML = `The network connected, but the 3D engine crashed.<br><br><b>Developer Note:</b> Check the browser console (F12).`;
            }
        }

        // --- 8. SWIPE GESTURES ---
        let dashSwipeStartX = 0;
        let dashSwipeStartY = 0;
        let isDashDragging = false;
        let isVerticalDrag = false;
        let dragLocked = false;
        let startedOnHeader = false;
        
        const dashboardEl = document.getElementById('dashboard');
        
        dashboardEl.addEventListener('pointerdown', e => {
            // Ignore if interacting with horizontal scroll, log buttons, images, or interactive UI elements
            if (e.target.closest('.day-selector') || e.target.closest('.nav-btn') || e.target.closest('.minimize-btn') || e.target.closest('.alien-image')) return;
            dashSwipeStartX = e.clientX;
            dashSwipeStartY = e.clientY;
            isDashDragging = true;
            isVerticalDrag = false;
            dragLocked = false;
            startedOnHeader = !!e.target.closest('.dashboard-header');

            if (window.innerWidth <= 768 && startedOnHeader) {
                dashboardEl.style.transition = 'none'; // Instant finger tracking
            }
        });

        dashboardEl.addEventListener('pointermove', e => {
            if (!isDashDragging) return;

            const diffX = dashSwipeStartX - e.clientX;
            const diffY = dashSwipeStartY - e.clientY; // Positive = swiping UP

            if (!dragLocked && (Math.abs(diffX) > 10 || Math.abs(diffY) > 10)) {
                dragLocked = true;
                if (Math.abs(diffY) > Math.abs(diffX) && window.innerWidth <= 768) {
                    isVerticalDrag = true;
                }
            }

            if (dragLocked && isVerticalDrag) {
                if (!startedOnHeader) return; // Leave native inner scrolling alone for text contents

                e.preventDefault(); 
                const isMinimized = dashboardEl.classList.contains('minimized');
                let translateY = 0;
                
                if (isMinimized) {
                    const maxOffset = dashboardEl.offsetHeight - 60;
                    translateY = maxOffset - diffY;
                    translateY = Math.max(0, Math.min(translateY, maxOffset));
                } else {
                    translateY = -diffY;
                    const maxOffset = dashboardEl.offsetHeight - 60;
                    translateY = Math.max(0, Math.min(translateY, maxOffset));
                }
                dashboardEl.style.transform = `translateY(${translateY}px)`;
            }
        });
        
        dashboardEl.addEventListener('pointerup', e => {
            if (!isDashDragging) return;
            isDashDragging = false;
            
            // Enable smooth transition
            dashboardEl.style.transition = '';
            
            // Force browser layout recalculation so the transition applies while the inline transform is still active
            void dashboardEl.offsetHeight;

            if (dragLocked && isVerticalDrag && window.innerWidth <= 768 && startedOnHeader) {
                const diffY = dashSwipeStartY - e.clientY;
                if (diffY > 40) { // Dragged up significantly
                    dashboardEl.classList.remove('minimized');
                    const dashToggle = document.getElementById('dash-toggle');
                    if (dashToggle) dashToggle.textContent = '−';
                } else if (diffY < -40) { // Dragged down significantly
                    dashboardEl.classList.add('minimized');
                    const dashToggle = document.getElementById('dash-toggle');
                    if (dashToggle) dashToggle.textContent = '+';
                }
            } else if (!isVerticalDrag) {
                const diffX = dashSwipeStartX - e.clientX;
                const diffY = dashSwipeStartY - e.clientY;
                if (Math.abs(diffX) > 50) { 
                    if (diffX > 0) {
                        navigateLog(1);
                    } else {
                        navigateLog(-1);
                    }
                } else if (!dragLocked && Math.abs(diffX) < 10 && Math.abs(diffY) < 10) {
                    // It was just a tap, manually trigger the header toggle
                    if (window.innerWidth <= 768 && e.target.closest('.dashboard-header')) {
                        toggleDashboard();
                    }
                }
            }
            
            // Defer removing the manual transform to the next frame.
            // This guarantees a smooth glide from the finger's dragged location to the final CSS state!
            requestAnimationFrame(() => {
                dashboardEl.style.transform = '';
            });
            
            dragLocked = false;
        });
        
        dashboardEl.addEventListener('pointercancel', () => {
            isDashDragging = false;
            dragLocked = false;
            dashboardEl.style.transition = '';
            dashboardEl.style.transform = '';
        });

        startGalacticExplorer();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
